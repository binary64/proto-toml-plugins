name: Test Plugins (reusable)

on:
  workflow_call:

jobs:
  discover:
    name: Discover plugins
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.list.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          plugins=$(ls -1d */plugin.toml | sed 's|/plugin.toml||' | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "plugins=$plugins" >> "$GITHUB_OUTPUT"
          echo "Found $(echo "$plugins" | jq length) plugins"

  test:
    name: ${{ matrix.plugin }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install proto
        run: |
          curl -fsSL https://moonrepo.dev/install/proto.sh | bash -s -- --yes
          echo "$HOME/.proto/bin" >> "$GITHUB_PATH"
          echo "$HOME/.proto/shims" >> "$GITHUB_PATH"

      - name: Configure plugin
        run: |
          printf '\n[plugins]\n%s = "source:%s/%s/plugin.toml"\n' \
            "${{ matrix.plugin }}" "${{ github.workspace }}" "${{ matrix.plugin }}" >> .prototools
          echo "--- .prototools ---"
          cat .prototools

      # Test 1: `proto versions` lists tags (basic plugin parsing + git-url works)
      - name: List versions
        id: list
        run: |
          set -euo pipefail
          versions=$(proto versions ${{ matrix.plugin }} 2>&1)
          echo "$versions" | tail -5
          latest=$(echo "$versions" | tail -1 | awk '{print $1}')
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "Latest tag-derived version: $latest"

      # Test 2: resolve `latest` end-to-end — catches missing/loose version-pattern
      - name: Install (resolve latest, no pinned version)
        run: |
          set -euo pipefail
          proto install ${{ matrix.plugin }}

      # Test 3: install at the explicit version proto resolved (sanity check)
      - name: Install (explicit version)
        run: |
          set -euo pipefail
          proto install ${{ matrix.plugin }} ${{ steps.list.outputs.latest }}

      # Test 4: shim/run path — verifies the binary is reachable and executable
      - name: Verify binary
        run: |
          proto run ${{ matrix.plugin }} -- --version \
            || proto run ${{ matrix.plugin }} -- -version \
            || proto run ${{ matrix.plugin }} -- version \
            || echo "⚠️ --version not supported, but binary exists at $(proto run ${{ matrix.plugin }} -- echo OK 2>&1 | tail -1)"
