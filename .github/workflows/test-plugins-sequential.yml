name: Test Plugins (Sequential)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-all:
    name: Test all plugins sequentially
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install proto
        run: |
          curl -fsSL https://moonrepo.dev/install/proto.sh | bash -s -- --yes
          echo "$HOME/.proto/bin" >> "$GITHUB_PATH"
          echo "$HOME/.proto/shims" >> "$GITHUB_PATH"

      - name: Discover plugins
        id: discover
        run: |
          plugins=$(ls -1d */plugin.toml | sed 's|/plugin.toml||' | grep -v "^$")
          echo "plugins<<EOF" >> "$GITHUB_OUTPUT"
          echo "$plugins" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          count=$(echo "$plugins" | wc -l)
          echo "Found $count plugins"

      - name: Test each plugin sequentially
        run: |
          plugins="${{ steps.discover.outputs.plugins }}"
          
          for plugin in $plugins; do
            echo "========================================"
            echo "Testing plugin: $plugin"
            echo "========================================"
            
            # Configure plugin
            printf '\n[plugins]\n%s = "source:%s/%s/plugin.toml"\n' \
              "$plugin" "${{ github.workspace }}" "$plugin" >> .prototools
            
            echo "--- .prototools ---"
            cat .prototools
            
            # Resolve latest version
            version=$(proto list-remote "$plugin" 2>/dev/null | tail -1)
            echo "Latest version: $version"
            
            # Install plugin
            if ! proto install "$plugin" "$version"; then
              echo "❌ Failed to install $plugin"
              exit 1
            fi
            
            # Verify binary
            if ! proto run "$plugin" -- --version 2>/dev/null; then
              if ! proto run "$plugin" -- version 2>/dev/null; then
                echo "⚠️ --version not supported for $plugin, but binary exists"
              fi
            fi
            
            echo "✅ $plugin passed"
            echo ""
          done
          
          echo "All plugins tested successfully!"