name = "bearer"
type = "cli"

[platform.linux]
download-file = "bearer_{version}_linux_{arch}.tar.gz"

[platform.macos]
download-file = "bearer_{version}_darwin_{arch}.tar.gz"

[install]
download-url = "https://github.com/Bearer/bearer/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/Bearer/bearer/releases/download/v{version}/checksums.txt"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.bearer]
primary = true

[resolve]
git-url = "https://github.com/Bearer/bearer"
version-pattern = '^v(\d+\.\d+\.\d+)$'
