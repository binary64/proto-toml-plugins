name = "cargo-watch"
type = "cli"

[platform.linux]
download-file = "cargo-watch-v{version}-{arch}-unknown-linux-gnu.tar.xz"
archive-prefix = "cargo-watch-v{version}-{arch}-unknown-linux-gnu"

[platform.macos]
download-file = "cargo-watch-v{version}-{arch}-apple-darwin.tar.xz"
archive-prefix = "cargo-watch-v{version}-{arch}-apple-darwin"

[platform.windows]
download-file = "cargo-watch-v{version}-{arch}-pc-windows-msvc.zip"
archive-prefix = "cargo-watch-v{version}-{arch}-pc-windows-msvc"

[install]
download-url = "https://github.com/watchexec/cargo-watch/releases/download/v{version}/{download_file}"

[install.arch]
aarch64 = "aarch64"
x86_64 = "x86_64"

[install.exes.cargo-watch]
primary = true

[resolve]
git-url = "https://github.com/watchexec/cargo-watch"
