name = "cntb"
type = "cli"

[platform.linux]
download-file = "cntb_v{version}_linux_{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.macos]
download-file = "cntb_v{version}_darwin_{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.windows]
download-file = "cntb_v{version}_windows_{arch}.zip"
checksum-file = "checksums.txt"

[install]
download-url = "https://github.com/contabo/cntb/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/contabo/cntb/releases/download/v{version}/{checksum_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.cntb]
primary = true

[resolve]
git-url = "https://github.com/contabo/cntb"
