name = "discrawl"
type = "cli"

[platform.linux]
download-file = "discrawl_{version}_linux_{arch}.tar.gz"

[platform.macos]
download-file = "discrawl_{version}_darwin_{arch}.tar.gz"

[platform.windows]
download-file = "discrawl_{version}_windows_{arch}.zip"

[install]
download-url = "https://github.com/steipete/discrawl/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/steipete/discrawl/releases/download/v{version}/checksums.txt"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.discrawl]
primary = true

[resolve]
git-url = "https://github.com/steipete/discrawl"
version-pattern = '^v(\d+\.\d+\.\d+)$'
