name = "dust"
type = "cli"

[platform.linux]
download-file = "dust-v{version}-{arch}-unknown-linux-gnu.tar.gz"
archive-prefix = "dust-v{version}-{arch}-unknown-linux-gnu"

[platform.macos]
download-file = "dust-v{version}-{arch}-apple-darwin.tar.gz"
archive-prefix = "dust-v{version}-{arch}-apple-darwin"

[platform.windows]
download-file = "dust-v{version}-{arch}-pc-windows-msvc.zip"
archive-prefix = "dust-v{version}-{arch}-pc-windows-msvc"

[install]
download-url = "https://github.com/bootandy/dust/releases/download/v{version}/{download_file}"

[install.arch]
aarch64 = "aarch64"
x86_64 = "x86_64"

[install.exes.dust]
primary = true

[resolve]
git-url = "https://github.com/bootandy/dust"
