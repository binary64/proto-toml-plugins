name = "ffuf"
type = "cli"

[platform.linux]
download-file = "ffuf_{version}_linux_{arch}.tar.gz"
checksum-file = "ffuf_{version}_checksums.txt"

[platform.macos]
download-file = "ffuf_{version}_macOS_{arch}.tar.gz"
checksum-file = "ffuf_{version}_checksums.txt"

[platform.windows]
download-file = "ffuf_{version}_windows_{arch}.zip"
checksum-file = "ffuf_{version}_checksums.txt"

[install]
download-url = "https://github.com/ffuf/ffuf/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/ffuf/ffuf/releases/download/v{version}/{checksum_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.ffuf]
primary = true

[resolve]
git-url = "https://github.com/ffuf/ffuf"
version-pattern = '^v(\d+\.\d+\.\d+)$'
