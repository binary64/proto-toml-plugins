name = "gogcli"
type = "cli"

[platform.linux]
download-file = "gogcli_{version}_linux_{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.macos]
download-file = "gogcli_{version}_darwin_{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.windows]
download-file = "gogcli_{version}_windows_{arch}.zip"
checksum-file = "checksums.txt"

[install]
download-url = "https://github.com/steipete/gogcli/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/steipete/gogcli/releases/download/v{version}/{checksum_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.gogcli]
exe-path = "gog"
primary = true

[resolve]
git-url = "https://github.com/steipete/gogcli"
version-pattern = '^v(\d+\.\d+\.\d+)$'
