name = "grex"
type = "cli"

[platform.linux]
download-file = "grex-v{version}-{arch}-unknown-linux-musl.tar.gz"

[platform.macos]
download-file = "grex-v{version}-{arch}-apple-darwin.tar.gz"

[platform.windows]
download-file = "grex-v{version}-{arch}-pc-windows-msvc.zip"

[install]
download-url = "https://github.com/pemistahl/grex/releases/download/v{version}/{download_file}"

[install.arch]
aarch64 = "aarch64"
x86_64 = "x86_64"

[install.exes.grex]
primary = true

[resolve]
git-url = "https://github.com/pemistahl/grex"
