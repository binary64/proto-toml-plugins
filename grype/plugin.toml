name = "grype"
type = "cli"

[platform.linux]
download-file = "grype_{version}_linux_{arch}.tar.gz"

[platform.macos]
download-file = "grype_{version}_darwin_{arch}.tar.gz"

[platform.windows]
download-file = "grype_{version}_windows_{arch}.zip"

[install]
download-url = "https://github.com/anchore/grype/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/anchore/grype/releases/download/v{version}/grype_{version}_checksums.txt"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.grype]
primary = true

[resolve]
git-url = "https://github.com/anchore/grype"
version-pattern = '^v(\d+\.\d+\.\d+)$'
