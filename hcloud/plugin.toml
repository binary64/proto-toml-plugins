name = "hcloud"
type = "cli"

[platform.linux]
download-file = "hcloud-linux-{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.macos]
download-file = "hcloud-darwin-{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.windows]
download-file = "hcloud-windows-{arch}.zip"
checksum-file = "checksums.txt"

[install]
download-url = "https://github.com/hetznercloud/cli/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/hetznercloud/cli/releases/download/v{version}/{checksum_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.hcloud]
primary = true

[resolve]
git-url = "https://github.com/hetznercloud/cli"
version-pattern = '^v(\d+\.\d+\.\d+)$'
