name = "hurl"
type = "cli"

[platform.linux]
download-file = "hurl_{version}_linux_amd64.tar.gz"

[platform.macos]
download-file = "hurl_{version}_macos_amd64.tar.gz"

[platform.windows]
download-file = "hurl_{version}_windows_amd64.zip"

[install]
download-url = "https://github.com/carlmjohnson/hurl/releases/download/{version}/{download_file}"

[install.exes.hurl]
primary = true

[resolve]
manifest-url = "https://api.github.com/repos/carlmjohnson/hurl/releases"
version-pattern = "^v(\\d+\\.\\d+\\.\\d+)"
