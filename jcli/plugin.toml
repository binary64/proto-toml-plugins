name = "jcli"
type = "cli"

[platform.linux]
download-file = "jcli-linux-{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.macos]
download-file = "jcli-darwin-{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.windows]
download-file = "jcli-windows-{arch}.zip"
checksum-file = "checksums.txt"

[install]
download-url = "https://github.com/jenkins-zh/jenkins-cli/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/jenkins-zh/jenkins-cli/releases/download/v{version}/{checksum_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.jcli]
primary = true

[resolve]
git-url = "https://github.com/jenkins-zh/jenkins-cli"
version-pattern = '^v(\d+\.\d+\.\d+)$'
