name = "kube-bench"
type = "cli"

[platform.linux]
download-file = "kube-bench_{version}_linux_{arch}.tar.gz"

[platform.macos]
download-file = "kube-bench_{version}_darwin_{arch}.tar.gz"

[install]
download-url = "https://github.com/aquasecurity/kube-bench/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/aquasecurity/kube-bench/releases/download/v{version}/kube-bench_{version}_checksums.txt"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.kube-bench]
primary = true

[resolve]
git-url = "https://github.com/aquasecurity/kube-bench"
version-pattern = '^v(\d+\.\d+\.\d+)$'
