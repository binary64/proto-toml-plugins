name = "nuclei"
type = "cli"

[platform.linux]
download-file = "nuclei_{version}_linux_{arch}.zip"
checksum-file = "nuclei_{version}_checksums.txt"

[platform.macos]
download-file = "nuclei_{version}_macOS_{arch}.zip"
checksum-file = "nuclei_{version}_checksums.txt"

[platform.windows]
download-file = "nuclei_{version}_windows_{arch}.zip"
checksum-file = "nuclei_{version}_checksums.txt"

[install]
download-url = "https://github.com/projectdiscovery/nuclei/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/projectdiscovery/nuclei/releases/download/v{version}/{checksum_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.nuclei]
primary = true

[resolve]
git-url = "https://github.com/projectdiscovery/nuclei"
