name = "packer"
type = "cli"

[platform.linux]
download-file = "packer_{version}_linux_{arch}.zip"

[platform.macos]
download-file = "packer_{version}_darwin_{arch}.zip"

[platform.windows]
download-file = "packer_{version}_windows_{arch}.zip"

[install]
download-url = "https://releases.hashicorp.com/packer/{version}/{download_file}"
checksum-url = "https://releases.hashicorp.com/packer/{version}/packer_{version}_SHA256SUMS"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.packer]
primary = true

[resolve]
git-url = "https://github.com/hashicorp/packer"
version-pattern = '^v(\d+\.\d+\.\d+)$'
