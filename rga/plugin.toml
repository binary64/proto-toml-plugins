name = "rga"
type = "cli"

[platform.linux]
download-file = "ripgrep_all-v{version}-{arch}-unknown-linux-musl.tar.gz"
archive-prefix = "ripgrep_all-v{version}-{arch}-unknown-linux-musl"

[platform.macos]
download-file = "ripgrep_all-v{version}-{arch}-apple-darwin.tar.gz"
archive-prefix = "ripgrep_all-v{version}-{arch}-apple-darwin"

[install]
download-url = "https://github.com/phiresky/ripgrep-all/releases/download/v{version}/{download_file}"

[install.arch]
aarch64 = "aarch64"
x86_64 = "x86_64"

[install.exes.rga]
primary = true

[install.exes.rga-preproc]

[resolve]
git-url = "https://github.com/phiresky/ripgrep-all"
