name = "subjack"
type = "cli"

[platform.linux]
download-file = "subjack-linux-amd64"

[platform.macos]
download-file = "subjack-darwin-amd64"

[platform.windows]
download-file = "subjack-windows-amd64.exe"

[install]
download-url = "https://github.com/haccer/subjack/releases/download/v{version}/{download_file}"

[install.exes.subjack]
primary = true

[resolve]
git-url = "https://github.com/haccer/subjack"
version-pattern = "^v(\\d+\\.\\d+\\.\\d+)"
