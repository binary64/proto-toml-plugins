name = "tlsx"
type = "cli"

[platform.linux]
download-file = "tlsx_{version}_linux_{arch}.zip"

[platform.macos]
download-file = "tlsx_{version}_macOS_{arch}.zip"

[platform.windows]
download-file = "tlsx_{version}_windows_{arch}.zip"

[install]
download-url = "https://github.com/projectdiscovery/tlsx/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/projectdiscovery/tlsx/releases/download/v{version}/tlsx_{version}_checksums.txt"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.tlsx]
primary = true

[resolve]
git-url = "https://github.com/projectdiscovery/tlsx"
version-pattern = '^v(\d+\.\d+\.\d+)$'
