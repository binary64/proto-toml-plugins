name = "vault"
type = "cli"

[platform.linux]
download-file = "vault_{version}_linux_{arch}.zip"

[platform.macos]
download-file = "vault_{version}_darwin_{arch}.zip"

[platform.windows]
download-file = "vault_{version}_windows_{arch}.zip"

[install]
download-url = "https://releases.hashicorp.com/vault/{version}/{download_file}"
checksum-url = "https://releases.hashicorp.com/vault/{version}/vault_{version}_SHA256SUMS"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.vault]
primary = true

[resolve]
git-url = "https://github.com/hashicorp/vault"
version-pattern = '^v(\d+\.\d+\.\d+)$'
