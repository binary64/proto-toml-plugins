name = "vultr-cli"
type = "cli"

[platform.linux]
download-file = "vultr-cli_v{version}_linux_{arch}.tar.gz"
checksum-file = "vultr-cli_v{version}_checksums.txt"

[platform.macos]
download-file = "vultr-cli_v{version}_macOs_{arch}.tar.gz"
checksum-file = "vultr-cli_v{version}_checksums.txt"

[platform.windows]
download-file = "vultr-cli_v{version}_windows_{arch}.zip"
checksum-file = "vultr-cli_v{version}_checksums.txt"

[install]
download-url = "https://github.com/vultr/vultr-cli/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/vultr/vultr-cli/releases/download/v{version}/{checksum_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "amd64"

[install.exes.vultr-cli]
primary = true

[resolve]
git-url = "https://github.com/vultr/vultr-cli"
version-pattern = '^v(\d+\.\d+\.\d+)$'
